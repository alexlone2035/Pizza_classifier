version: '3.8'

services:
  api:
    build: ./api
    container_name: api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - model
    env_file:
      - .env

  bot:
    build: ./pizza_qc_bot
    container_name: bot
    depends_on:
      - api
    env_file:
      - .env

  db:
    image: postgres:15
    container_name: db
    environment:
      - POSTGRES_USER=pizza
      - POSTGRES_PASSWORD=pizza
      - POSTGRES_DB=pizza_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  model:
    build: ./model
    container_name: model
    ports:
      - "9000:9000"
    volumes:
      - ./classifier_dataset:/model/classifier_dataset
      - ./pizza_dataset:/model/pizza_dataset

volumes:
  pgdata:
